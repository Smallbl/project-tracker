<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>最小测试</title>
<style>
body { font-family: sans-serif; padding: 20px; }
.error { color: red; }
.success { color: green; }
.project { border: 1px solid #ccc; padding: 10px; margin: 10px 0; border-radius: 8px; }
.status { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; }
.status-progress { background: #e8f5e9; color: #2e7d32; }
.status-warn { background: #fff8e1; color: #f57f17; }
table { width: 100%; border-collapse: collapse; margin-top: 10px; }
th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
th { background: #f5f5f5; }
</style>
</head>
<body>
<h1>📋 项目跟踪系统</h1>
<div id="projects">加载中...</div>

<script>
// 直接在全局执行
(async function() {
    try {
        const resp = await fetch('/api/projects');
        if (!resp.ok) throw new Error('API响应失败: ' + resp.status);
        const data = await resp.json();
        
        let html = '';
        for (const group of ['四建', '亚太']) {
            if (!data[group]) continue;
            html += '<h2>' + (group === '四建' ? '🤖' : '🏢') + ' ' + group + '项目</h2>';
            for (const p of data[group]) {
                const statusClass = p.status.includes('完成') ? 'status-warn' : 'status-progress';
                html += '<div class="project">';
                html += '<h3>' + p.name + ' <span class="status ' + statusClass + '">' + p.status + '</span></h3>';
                if (p.node) html += '<p><strong>当前节点:</strong> ' + p.node + '</p>';
                if (p.tasks && p.tasks.length) {
                    html += '<table><thead><tr><th>✓</th><th>任务</th><th>优先级</th><th>截止</th></tr></thead><tbody>';
                    for (const t of p.tasks) {
                        const priorityColors = {high: 'red', medium: 'orange', low: 'green'};
                        const priorityLabels = {high: '🔴高', medium: '🟡中', low: '🟢低'};
                        const priority = t.priority || 'medium';
                        html += '<tr>';
                        html += '<td>' + (t.done ? '✅' : '☐') + '</td>';
                        html += '<td>' + t.text + '</td>';
                        html += '<td style="color:' + priorityColors[priority] + '">' + priorityLabels[priority] + '</td>';
                        html += '<td>' + (t.due || '-') + '</td>';
                        html += '</tr>';
                    }
                    html += '</tbody></table>';
                }
                html += '</div>';
            }
        }
        if (!html) html = '<p>暂无数据</p>';
        document.getElementById('projects').innerHTML = html;
    } catch(e) {
        document.getElementById('projects').innerHTML = '<p class="error">加载失败: ' + e.message + '</p>';
        console.error(e);
    }
})();
</script>
</body>
</html>
