<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📋 项目跟踪系统</title>
<style>
  :root {
    --bg: #f0f2f5;
    --card-bg: #ffffff;
    --text: #1d1d1f;
    --text-secondary: #666;
    --text-muted: #86868b;
    --border: #e0e0e0;
    --accent: #667eea;
    --accent-hover: #5a6fd6;
    --shadow: rgba(0,0,0,0.08);
    --shadow-hover: rgba(0,0,0,0.12);
    --header-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    --status-progress-bg: #e8f5e9;
    --status-progress-text: #2e7d32;
    --status-warn-bg: #fff8e1;
    --status-warn-text: #f57f17;
    --status-todo-bg: #e3f2fd;
    --status-todo-text: #1565c0;
    --status-done-bg: #f3e5f5;
    --status-done-text: #7b1fa2;
    --modal-overlay: rgba(0,0,0,0.5);
    --input-bg: #ffffff;
    --input-border: #ddd;
    --tab-bg: #ffffff;
    --tab-text: #666;
  }
  [data-theme="dark"] {
    --bg: #1a1a2e;
    --card-bg: #25253a;
    --text: #e8e8f0;
    --text-secondary: #aaa;
    --text-muted: #888;
    --border: #3a3a5c;
    --shadow: rgba(0,0,0,0.3);
    --shadow-hover: rgba(0,0,0,0.4);
    --header-bg: linear-gradient(135deg, #4a4a8a 0%, #3a3a6a 100%);
    --status-progress-bg: #1a3a1a;
    --status-progress-text: #6bc76b;
    --status-warn-bg: #3a3520;
    --status-warn-text: #e8c56b;
    --status-todo-bg: #1a2a3a;
    --status-todo-text: #6ba3e8;
    --status-done-bg: #2a1a3a;
    --status-done-text: #b76bc7;
    --modal-overlay: rgba(0,0,0,0.7);
    --input-bg: #1a1a2e;
    --input-border: #4a4a6c;
    --tab-bg: #25253a;
    --tab-text: #aaa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.3s, color 0.3s; }
  .header { background: var(--header-bg); color: white; padding: 24px 32px; box-shadow: 0 2px 12px var(--shadow); display: flex; justify-content: space-between; align-items: flex-start; transition: background 0.3s; }
  .header-left h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .header-left p { font-size: 13px; opacity: 0.85; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .header-right .update-time { font-size: 12px; opacity: 0.7; }
  .theme-toggle { background: rgba(255,255,255,0.15); border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
  .theme-toggle:hover { background: rgba(255,255,255,0.25); }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab { padding: 8px 20px; background: var(--tab-bg); border: none; border-radius: 8px; cursor: pointer; font-size: 14px; color: var(--tab-text); box-shadow: 0 1px 3px var(--shadow); transition: all 0.2s; }
  .tab:hover { background: var(--border); }
  .tab.active { background: var(--accent); color: white; box-shadow: 0 2px 8px rgba(102,126,234,0.4); }
  .section-title { font-size: 16px; font-weight: 600; margin: 20px 0 12px 0; padding-left: 12px; border-left: 4px solid var(--accent); color: var(--text); }
  .card { background: var(--card-bg); border-radius: 12px; padding: 18px 20px; margin-bottom: 14px; box-shadow: 0 1px 4px var(--shadow); transition: all 0.2s, background 0.3s; }
  .card:hover { box-shadow: 0 4px 12px var(--shadow-hover); transform: translateY(-1px); }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .card-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .status { font-size: 12px; padding: 3px 12px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
  .status-progress { background: var(--status-progress-bg); color: var(--status-progress-text); }
  .status-warn { background: var(--status-warn-bg); color: var(--status-warn-text); }
  .status-todo { background: var(--status-todo-bg); color: var(--status-todo-text); }
  .status-done { background: var(--status-done-bg); color: var(--status-done-text); }
  .field { display: flex; gap: 8px; margin-bottom: 6px; font-size: 13px; }
  .field-label { color: var(--text-muted); min-width: 72px; }
  .field-value { color: var(--text-secondary); flex: 1; }
  .tasks { margin-top: 10px; }
  .task { font-size: 13px; padding: 5px 0; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text); }
  .task:last-child { border-bottom: none; }
  .task:hover { color: var(--accent); }
  .task-check { width: 16px; height: 16px; border-radius: 4px; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; }
  .task-check.done { background: var(--accent); border-color: var(--accent); color: white; }
  .task-text.done { color: var(--text-muted); text-decoration: line-through; }
  .meetings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 12px; }
  .meeting-card { background: var(--card-bg); border-radius: 10px; padding: 14px 16px; box-shadow: 0 1px 4px var(--shadow); transition: background 0.3s; }
  .meeting-date { background: var(--accent); color: white; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; display: inline-block; margin-bottom: 8px; }
  .meeting-name { font-size: 14px; font-weight: 500; margin-bottom: 4px; color: var(--text); }
  .meeting-time { font-size: 12px; color: var(--text-muted); }
  .edit-btn { background: var(--accent); color: white; border: none; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: background 0.2s; }
  .edit-btn:hover { background: var(--accent-hover); }
  .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--modal-overlay); z-index: 1000; justify-content: center; align-items: center; }
  .modal.show { display: flex; }
  .modal-content { background: var(--card-bg); border-radius: 16px; padding: 28px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; color: var(--text); }
  .modal h2 { font-size: 18px; margin-bottom: 16px; color: var(--text); }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--input-border); border-radius: 8px; font-size: 14px; background: var(--input-bg); color: var(--text); }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-secondary { background: var(--border); color: var(--text); }
  .no-data { text-align: center; color: var(--text-muted); padding: 40px; font-size: 14px; }
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <h1>📋 项目跟踪系统</h1>
    <p>四建 & 亚太项目进度跟踪 · 招投标行业</p>
  </div>
  <div class="header-right">
    <span class="update-time" id="updateTime"></span>
    <button class="theme-toggle" id="themeToggle" title="切换深色/浅色模式">🌙</button>
  </div>
</div>
<div class="container">
  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="all">全部项目</button>
    <button class="tab" data-tab="四建">🤖 四建</button>
    <button class="tab" data-tab="亚太">🏢 亚太</button>
    <button class="tab" data-tab="meetings">📅 会议</button>
  </div>
  <div id="content"></div>
</div>
<div class="modal" id="editModal">
  <div class="modal-content">
    <h2 id="modalTitle">编辑项目</h2>
    <input type="hidden" id="editId">
    <input type="hidden" id="editGroup">
    <div class="form-group"><label>项目名称</label><input type="text" id="editName"></div>
    <div class="form-group">
      <label>状态</label>
      <select id="editStatus">
        <option value="进行中">进行中</option>
        <option value="待评估">待评估</option>
        <option value="待跟进">待跟进</option>
        <option value="待开会">待开会</option>
        <option value="多项待跟进">多项待跟进</option>
        <option value="两步走">两步走</option>
        <option value="已完成">已完成</option>
      </select>
    </div>
    <div class="form-group"><label>当前节点</label><input type="text" id="editNode"></div>
    <div class="form-group"><label>截止日期</label><input type="text" id="editDeadline"></div>
    <div class="form-group"><label>当前问题</label><textarea id="editIssues"></textarea></div>
    <div class="form-group"><label>子任务（每行一个）</label><textarea id="editTasks" placeholder="每行一个任务，已完成的在前面加✅"></textarea></div>
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveProject()">保存</button>
    </div>
  </div>
</div>
<script>
let data = {};
let currentTab = 'all';

function initTheme() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.setAttribute('data-theme', saved);
    updateThemeIcon(saved);
  }
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  updateThemeIcon(next);
}

function updateThemeIcon(theme) {
  document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀️' : '🌙';
}

document.getElementById('themeToggle').addEventListener('click', toggleTheme);

async function loadData() {
  const r = await fetch('/api/projects');
  data = await r.json();
  document.getElementById('updateTime').textContent = '最后更新: ' + new Date().toLocaleString('zh-CN');
  render();
}

function render() {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === currentTab));
  let html = '';
  if (currentTab === 'meetings') {
    html = '<div class="meetings-grid">';
    (data.meetings || []).forEach(m => {
      html += '<div class="meeting-card"><div class="meeting-date">' + m.date + '</div><div class="meeting-name">' + m.name + '</div><div class="meeting-time">' + m.time + ' ' + (m.remark || '') + '</div></div>';
    });
    html += '</div>';
  } else {
    const groups = currentTab === 'all' ? ['四建', '亚太'] : [currentTab];
    groups.forEach(group => {
      if (!data[group]) return;
      html += '<div class="section-title">' + (group === '四建' ? '🤖 四建项目' : '🏢 亚太项目') + '</div>';
      data[group].forEach(p => {
        const sc = p.status.includes('完成') ? 'status-done' : p.status.includes('待') || p.status.includes('评估') ? 'status-warn' : p.status.includes('开会') ? 'status-todo' : 'status-progress';
        html += '<div class="card"><div class="card-header"><div class="card-title">' + p.name + '</div><div style="display:flex;gap:8px;align-items:center"><span class="status ' + sc + '">' + p.status + '</span><button class="edit-btn" onclick="editProject(\'' + group + '\',\'' + p.id + '\')">编辑</button></div></div>';
        if (p.node) html += '<div class="field"><span class="field-label">当前节点</span><span class="field-value">' + p.node + '</span></div>';
        if (p.deadline) html += '<div class="field"><span class="field-label">截止日期</span><span class="field-value">' + p.deadline + '</span></div>';
        if (p.issues) html += '<div class="field"><span class="field-label">当前问题</span><span class="field-value">' + p.issues + '</span></div>';
        html += '<div class="tasks">';
        (p.tasks || []).forEach(t => {
          const done = t.done ? 'done' : '';
          const check = t.done ? 'done' : '';
          const text = t.text.replace(/'/g, "\\'");
          html += '<div class="task" onclick="toggleTask(\'' + group + '\',\'' + p.id + '\',\'' + text + '\')"><div class="task-check ' + check + '">' + (t.done ? '✓' : '') + '</div><span class="task-text ' + done + '">' + t.text.replace('✅ ','') + '</span></div>';
        });
        html += '</div></div>';
      });
    });
    if (!html) html = '<div class="no-data">暂无数据</div>';
  }
  document.getElementById('content').innerHTML = html;
}

document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', () => { currentTab = tab.dataset.tab; render(); }));

function editProject(group, id) {
  const p = data[group].find(x => x.id === id);
  if (!p) return;
  document.getElementById('modalTitle').textContent = '编辑项目';
  document.getElementById('editId').value = id;
  document.getElementById('editGroup').value = group;
  document.getElementById('editName').value = p.name;
  document.getElementById('editStatus').value = p.status;
  document.getElementById('editNode').value = p.node || '';
  document.getElementById('editDeadline').value = p.deadline || '';
  document.getElementById('editIssues').value = p.issues || '';
  document.getElementById('editTasks').value = (p.tasks || []).map(t => (t.done ? '✅ ' : '☐ ') + t.text).join('\n');
  document.getElementById('editModal').classList.add('show');
}

async function toggleTask(group, id, text) {
  const p = data[group].find(x => x.id === id);
  if (!p) return;
  const t = p.tasks.find(x => x.text === text);
  if (!t) return;
  t.done = !t.done;
  await saveToServer();
  render();
}

async function saveProject() {
  const group = document.getElementById('editGroup').value;
  const id = document.getElementById('editId').value;
  const tasksText = document.getElementById('editTasks').value;
  const project = {
    id,
    name: document.getElementById('editName').value,
    status: document.getElementById('editStatus').value,
    node: document.getElementById('editNode').value,
    deadline: document.getElementById('editDeadline').value,
    issues: document.getElementById('editIssues').value,
    tasks: tasksText.split('\n').filter(t => t.trim()).map(t => ({ text: t.replace('✅ ','').replace('☐ ',''), done: t.includes('✅') }))
  )};
  const idx = data[group].findIndex(x => x.id === id);
  if (idx >= 0) data[group][idx] = project;
  else data[group].push(project);
  await saveToServer();
  closeModal();
  render();
}

async function saveToServer() {
  await fetch('/api/projects', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
}

function closeModal() { document.getElementById('editModal').classList.remove('show'); }

initTheme();
loadData();
</script>
</body>
</html>
